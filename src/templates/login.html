<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
        }

        .container {
            width: 950px;
            height: 550px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .left {
            width: 50%;
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 38px;
            margin-bottom: 20px;
        }

        .left p {
            color: #dbeafe;
            margin-bottom: 25px;
        }

        .feature {
            margin: 10px 0;
        }

        .right {
            width: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 80%;
        }

        .login-box h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        .login-box p {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        .input-box {
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            outline: none;
        }

        .input-box input:focus {
            border-color: #2563eb;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .register {
            text-align: center;
            margin-top: 20px;
        }

        .register a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="left">

            <h1>🎓 AI Dropout Prediction & Counselling System</h1>



            <div class="feature">✓ Student Performance Tracking</div>
            <div class="feature">✓ AI Risk Prediction</div>
            <div class="feature">✓ Personalized Counselling</div>
            <div class="feature">✓ Academic Progress Monitoring</div>

        </div>

        <div class="right">

            <div class="login-box">

                <h2>Welcome Back 👋</h2>
                <p>Sign in to continue</p>

                <form action="/login" method="POST">

                    <div class="input-box">
                        <input type="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-box">
                        <input type="password" name="password" placeholder="Password" required>
                    </div>

                    <button class="btn" type="submit">
                        login
                    </button>

                </form>

                <div class="register">
                    Don't have an account?
                    <a href="/register">Create Account</a>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
